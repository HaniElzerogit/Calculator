<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="calculator">

  <!-- Top Bar -->
  <div class="top-bar">
    <span>☰ Standard</span>
    <span class="history">🕘</span>
  </div>

  <!-- Display -->
  <div class="display-container">
    <div class="expression"> </div>
    <div class="display" id="display">0</div>
  </div>

  <!-- Memory Buttons -->
  <!-- <div class="memory">
    <button>MC</button>
    <button>MR</button>
    <button>M+</button>
    <button>M-</button>
    <button>MS</button>
    <button>M▼</button>
  </div> -->

  <!-- Main Buttons -->
  <div class="buttons">

    <button class="gray">%</button>
    <button class="gray">CE</button>
    <button class="gray">C</button>
    <button class="gray">⌫</button>

    <button class="gray">1/x</button>
    <button class="gray">x²</button>
    <button class="gray">√x</button>
    <button class="operator">÷</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="operator">×</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="operator">−</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="operator">+</button>

    <button class="gray">±</button>
    <button>0</button>
    <button>.</button>
    <button class="equals">=</button>

  </div>

</div>

<script src="./js/main.js"></script>
</body>
</html>
